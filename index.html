<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приватный Чат PRO</title>
    <style>
        body { font-family: sans-serif; background: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #auth { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #075e54; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white; gap: 10px; }
        #auth input { padding: 12px; border-radius: 10px; border: none; width: 220px; text-align: center; font-size: 16px; }
        #auth button { background: #25d366; color: white; border: none; padding: 12px 40px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        header { background: #075e54; color: white; padding: 10px; font-size: 14px; text-align: center; }
        #chat-ui { display: none; flex-direction: column; height: 100vh; }
        #box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: white; padding: 8px 12px; border-radius: 10px; max-width: 80%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg b { display: block; font-size: 11px; color: #075e54; margin-bottom: 2px; }
        .my { align-self: flex-end; background: #dcf8c6; }
        footer { background: #eee; padding: 10px; display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        .send-btn { background: #128c7e; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
        img { max-width: 100%; border-radius: 5px; margin-top: 5px; display: block; cursor: pointer; }
        .loading { font-size: 10px; color: gray; font-style: italic; }
    </style>
</head>
<body>

    <div id="auth">
        <h3>Вход в систему</h3>
        <input type="text" id="nameInp" placeholder="Твоё Имя">
        <input type="password" id="passInp" placeholder="Пароль">
        <button onclick="login()">ВОЙТИ</button>
    </div>

    <div id="chat-ui">
        <header>В сети: <span id="list">...</span></header>
        <div id="box"></div>
        <div id="status" class="loading" style="padding-left:15px; display:none;">Загрузка файла...</div>
        <footer>
            <input type="file" id="fInp" style="display:none" onchange="uploadFile(this.files[0])" accept="image/*">
            <button onclick="document.getElementById('fInp').click()" style="background:none; border:none; font-size:24px; cursor:pointer;">📎</button>
            <input type="text" id="mInp" placeholder="Сообщение...">
            <button class="send-btn" onclick="send()">➤</button>
        </footer>
    </div>

    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.4.21.7.min.js"></script>
    <script>
        const PASS = '1234'; // ТВОЙ ПАРОЛЬ
        const IMGBB_KEY = 'b57886141bfe1b0072fb8fb28848a9ed'; // ТВОЙ КЛЮЧ ОТ IMGBB
        
        let user = "";
        let pn;

        function login() {
            const p = document.getElementById('passInp').value;
            user = document.getElementById('nameInp').value.trim();
            if (p === PASS && user !== "") {
                document.getElementById('auth').style.display = 'none';
                document.getElementById('chat-ui').style.display = 'flex';
                start();
            } else { alert("Ошибка!"); }
        }

        function start() {
            pn = new PubNub({ publishKey: 'demo', subscribeKey: 'demo', uuid: user });
            pn.subscribe({ channels: ['imgbb-chat-v1'], withPresence: true });
            pn.addListener({
                message: (m) => render(m.message, m.publisher === user, m.publisher),
                presence: () => showOnline()
            });
            showOnline();
        }

        function showOnline() {
            pn.hereNow({ channels: ['imgbb-chat-v1'], includeUUIDs: true }, (s, r) => {
                const names = r.channels['imgbb-chat-v1'].occupants.map(u => u.uuid);
                document.getElementById('list').innerText = names.join(', ');
            });
        }

        function render(data, isMy, name) {
            const d = document.createElement('div');
            d.className = 'msg' + (isMy ? ' my' : '');
            let h = `<b>${name}</b>`;
            if (data.t === 'txt') h += `<span>${data.v}</span>`;
            if (data.t === 'img') h += `<img src="${data.v}" onclick="window.open(this.src)">`;
            d.innerHTML = h;
            document.getElementById('box').appendChild(d);
            document.getElementById('box').scrollTop = document.getElementById('box').scrollHeight;
        }

        function send() {
            const i = document.getElementById('mInp');
            if (!i.value) return;
            pn.publish({ channel: 'imgbb-chat-v1', message: { t: 'txt', v: i.value } });
            i.value = '';
        }

        async function uploadFile(file) {
            if (!file) return;
            document.getElementById('status').style.display = 'block';

            let formData = new FormData();
            formData.append("image", file);

            try {
                let response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                    method: "POST",
                    body: formData
                });
                let result = await response.json();
                if (result.success) {
                    pn.publish({ 
                        channel: 'imgbb-chat-v1', 
                        message: { t: 'img', v: result.data.url } 
                    });
                }
            } catch (e) {
                alert("Ошибка загрузки!");
            } finally {
                document.getElementById('status').style.display = 'none';
            }
        }
    </script>
</body>
</html>
