<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приватный Чат</title>
    <style>
        /* Стили для окна входа */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #075e54; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white; }
        #auth-screen input { padding: 10px; border-radius: 10px; border: none; margin-bottom: 10px; width: 200px; text-align: center; }
        
        /* Стили чата (те же, что были) */
        body { font-family: sans-serif; background: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-ui { display: none; flex-direction: column; height: 100vh; }
        #box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: white; padding: 10px; border-radius: 10px; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .my { align-self: flex-end; background: #dcf8c6; }
        footer { background: #eee; padding: 10px; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button { background: #128c7e; color: white; border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; }
        img { max-width: 100%; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h3>Вход в систему</h3>
        <input type="password" id="passInput" placeholder="Введите пароль">
        <button onclick="checkPass()">Войти</button>
        <p id="error" style="color: #ff8a8a; display: none;">Неверный пароль!</p>
    </div>

    <div id="chat-ui">
        <div id="box"></div>
        <footer>
            <input type="file" id="fileInput" style="display:none" onchange="sendFile()">
            <button type="button" onclick="document.getElementById('fileInput').click()">📎</button>
            <input type="text" id="msgInput" placeholder="Сообщение...">
            <button onclick="sendText()">➤</button>
        </footer>
    </div>

    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.4.21.7.min.js"></script>
    <script>
        // ТУТ ЗАДАЕТСЯ ПАРОЛЬ! Поменяй '1234' на свой
        const SECRET_PASSWORD = '1607'; 

        function checkPass() {
            const pass = document.getElementById('passInput').value;
            if (pass === SECRET_PASSWORD) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('chat-ui').style.display = 'flex';
                initChat();
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }

        function initChat() {
            const pubnub = new PubNub({ publishKey: 'demo', subscribeKey: 'demo', uuid: 'user_' + Math.random().toString(16).slice(2) });
            pubnub.subscribe({ channels: ['chat-room-unique-123'] }); // Можно поменять ID комнаты на свой случайный

            pubnub.addListener({
                message: function(m) {
                    const isMy = m.publisher === pubnub.getUUID();
                    showMsg(m.message, isMy);
                }
            });

            window.sendText = function() {
                const input = document.getElementById('msgInput');
                if (!input.value) return;
                pubnub.publish({ channel: 'chat-room-unique-123', message: { type: 'text', val: input.value } });
                input.value = '';
            }

            window.sendFile = function() {
                const file = document.getElementById('fileInput').files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    pubnub.publish({ 
                        channel: 'chat-room-unique-123', 
                        message: { type: 'file', val: e.target.result, name: file.name, fileType: file.type } 
                    });
                };
                reader.readAsDataURL(file);
            }
        }

        function showMsg(data, isMy) {
            const div = document.createElement('div');
            div.className = 'msg' + (isMy ? ' my' : '');
            if (data.type === 'text') {
                div.innerText = data.val;
            } else if (data.type === 'file') {
                if (data.fileType.includes('image')) {
                    div.innerHTML = `<img src="${data.val}"><br><small>${data.name}</small>`;
                } else {
                    div.innerHTML = `<a href="${data.val}" download="${data.name}">📄 ${data.name}</a>`;
                }
            }
            document.getElementById('box').appendChild(div);
            document.getElementById('box').scrollTop = document.getElementById('box').scrollHeight;
        }
    </script>
</body>
</html>
